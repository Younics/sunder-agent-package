version: 2.1

orbs:
  win: circleci/windows@5.0

commands:
  install_dotnet_10:
    steps:
      - run:
          name: Install .NET 10 SDK
          command: |
            $ErrorActionPreference = "Stop"
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

            $installDir = "$env:USERPROFILE\.dotnet"
            $installScript = "$env:TEMP\dotnet-install.ps1"

            Invoke-WebRequest "https://dot.net/v1/dotnet-install.ps1" -UseBasicParsing -OutFile $installScript
            & $installScript -Channel 10.0 -InstallDir $installDir -Architecture x64
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            $env:PATH = "$installDir;$installDir\tools;$env:PATH"
            dotnet --info
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

jobs:
  agent_package_build_test:
    executor:
      name: win/default
      size: medium
    steps:
      - checkout
      - install_dotnet_10
      - run:
          name: Build and test Agent packages
          command: |
            $ErrorActionPreference = "Stop"
            $env:PATH = "$env:USERPROFILE\.dotnet;$env:USERPROFILE\.dotnet\tools;$env:PATH"

            function Invoke-Checked {
              param([scriptblock]$Command)

              & $Command
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }

            Invoke-Checked { dotnet restore ".\Sunder.AgentPackage.slnx" }
            Invoke-Checked { dotnet build ".\Sunder.AgentPackage.slnx" -c Release --no-restore }

            New-Item -ItemType Directory -Force -Path ".\test-results" | Out-Null

            $testProjects = @(
              ".\tests\Sunder.Package.Agent.Tests\Sunder.Package.Agent.Tests.csproj",
              ".\tests\Sunder.Package.Agent.Provider.OpenAI.Tests\Sunder.Package.Agent.Provider.OpenAI.Tests.csproj"
            )

            foreach ($testProject in $testProjects) {
              $testName = Split-Path (Split-Path $testProject -Parent) -Leaf
              Invoke-Checked { dotnet test $testProject -c Release --logger "trx;LogFileName=$testName.trx" --results-directory ".\test-results\$testName" }
            }
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results

workflows:
  sunder_agent_package:
    jobs:
      - agent_package_build_test
